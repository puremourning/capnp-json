name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release, e.g. 0.2.0 (no v prefix)'
        required: true
        type: string

concurrency:
  group: release
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    env:
      VERSION: ${{ inputs.version }}
    steps:
      - name: Validate version input
        run: |
          if ! [[ "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+(-[A-Za-z0-9.-]+)?$ ]]; then
            echo "Invalid version: $VERSION (expected SemVer like 0.2.0, no v prefix)"
            exit 1
          fi

      - name: Verify on main
        if: github.ref != 'refs/heads/main'
        run: |
          echo "Releases must be triggered from main (got ${{ github.ref }})"
          exit 1

      - uses: actions/checkout@v5

      - name: Install Cap'n Proto
        run: |
          export DEBIAN_FRONTEND=noninteractive
          sudo apt-get update
          sudo apt-get install -y capnproto libcapnp-dev

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Bump version
        run: |
          # Update [workspace.package].version (the only top-level
          # `version = "..."` in the workspace manifest).
          sed -i -E "0,/^version = /{s/^version = \"[^\"]+\"/version = \"$VERSION\"/}" Cargo.toml

          # Bump the install snippet in the crate README on minor changes
          # (e.g. 0.1 -> 0.2). No-op for patch bumps.
          MINOR=$(echo "$VERSION" | cut -d. -f1-2)
          sed -i -E "s/capnp-json = \"[0-9]+\\.[0-9]+\"/capnp-json = \"$MINOR\"/" crates/capnp-json/README.md

          if git diff --quiet Cargo.toml; then
            echo "Cargo.toml unchanged — workspace.package.version is already $VERSION"
            exit 1
          fi
          git diff Cargo.toml crates/capnp-json/README.md

      - name: Refresh Cargo.lock and run tests
        run: |
          cargo build --workspace
          cargo test --workspace

      - name: Verify package
        run: cargo publish -p capnp-json --dry-run

      - name: Commit, tag, and push
        run: |
          git commit -am "Release v$VERSION"
          git tag -a "v$VERSION" -m "v$VERSION"
          git push origin HEAD:${{ github.ref_name }}
          git push origin "v$VERSION"

      - name: Publish to crates.io
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: cargo publish -p capnp-json

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "v$VERSION" \
            --title "v$VERSION" \
            --generate-notes
